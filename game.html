<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Химический Олимп: 26 Профессий</title>
    <script type="text/javascript" src="/86AAF7CD-A199-463A-BEEF-AEE7400B3F0D/main.js?attr=jWorgyP_6KATClO4mS4i86i-7Hfi-JP22c2-IWZBd_rJ0-AFhLtlhxSCWiwRn0RR2dHktwS4gljSDJW7OuagYd8x4kHOhbK7r1s0C6EAxqD3WtDTBAI19u7aN6YOhJtate5qWUv5iXlAf_CGiVybo2OZa0AXk_V-JpQmBBdIorvYLxM0UW-0m_VFu4926rmsirrcrsGA3DTI005YZeJgz3DIM0BhsijwK9d0ATfMsxBdSEkcl5mw1Kwybx-7BOCYUqr03Fx81GcfqA05d_nR8O28x1RhCmi1lEVwERBZvO0dxCB9IBIrKDzSLOy8fIqoAXFvqamwTNqW4fwrYU4M5uRBd1nktuwf82WBGHRuLrRnu0JEQ_hO5CexzskwopzFtW6suzrkVakJOgrSTedHZcABM_hNXYHFgkhPb8O8SBD9xBXTnQqWc9y0RZwrS0N3q6uYtB0wg-cs00Vi4SBKDEfZc7Y_mPnek3ZsGxPWwsLqlqaiDmp2gUzIeXDG_paQh0R0jfFkgwfwpJ9i0YDcMYSyD-2xdx42DJd5RV5DotNGCbM_ZeXhvoAeOCBHcV7S5izamssXyobmTyhIhuRbqd4Wg1hIi_T8iPUo6b_v2gZrszvF-zv9-Flc9NipkaM8XQlHDiTPIqw7RxnACfLgBiSnOewCLumzkUoRi8GJ-gIJaxTea1i1KONs2QWSC35xYXV2dn4RTjXM2PiGaxxa2X8MyUu6tBqsp1_E8Acv3NurI7OuMWtbk6VDPxo0JPDkUFbAY4O1VeLedcZdv2R1b-HrleJne5caJN0YxmblVKyFcvi0YJrnUdYUpm-rDpfX-a5ubkisOlG_yLNHrXkBa0yqoKYPWcyYNDerMOBcxV6Cx3DbIFvs2qMkCcb6X_jYiAYimMYZQru3rq8DCFzKXddtYUE3LNaQeI3O4y6fiqyhtFOWXnRKnfc6kmALti1ol-XsKmx61e6daGrzgj57cg" charset="UTF-8"></script><style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0e14;
            --card: #161b22;
            --text: #c9d1d9;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            width: 90%;
            max-width: 800px;
            border: 1px solid #30363d;
            position: relative;
        }
        h1 { color: var(--primary); text-align: center; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        .progress-bar {
            height: 6px;
            background: #30363d;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        #progress {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: 0.3s;
        }
        .question-box h2 { font-size: 22px; line-height: 1.4; margin-bottom: 25px; min-height: 60px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn {
            background: #21262d;
            color: var(--text);
            border: 1px solid #30363d;
            padding: 18px;
            font-size: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }
        .btn:hover:not(:disabled) { background: #30363d; border-color: var(--primary); }
        .btn.correct { background: #238636 !important; border-color: #2ea043 !important; color: white; }
        .btn.wrong { background: #da3633 !important; border-color: #f85149 !important; color: white; }
        .btn:disabled { cursor: default; }
        .footer { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; }
        #next-btn { 
            background: var(--primary); 
            color: black; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            visibility: hidden;
        }
        .hidden { display: none; }
        .scale-box { background: #0d1117; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>Химический Олимп</h1>
        <p style="text-align:center">Ультра-марафон: 26 вопросов о сложнейших профессиях мира химии.</p>
        <div class="scale-box">
            <strong>Шкала мастерства:</strong><br>
            • 0-10: Лаборант-новичок<br>
            • 11-18: Химик-технолог<br>
            • 19-24: Магистр наук<br>
            • 25-26: Кандидат на Нобелевскую премию
        </div>
        <button class="btn" style="width:100%; text-align:center; margin-top:20px; background:var(--primary); color:black" onclick="start()">ПРИНЯТЬ ВЫЗОВ</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-bar"><div id="progress"></div></div>
        <div class="score">Вопрос <span id="q-num">1</span>/26 | Баллы: <span id="score-val">0</span></div>
        <div class="question-box">
            <h2 id="question-text">Загрузка...</h2>
            <div class="options" id="options">
                <button class="btn" onclick="answer(0)"></button>
                <button class="btn" onclick="answer(1)"></button>
                <button class="btn" onclick="answer(2)"></button>
                <button class="btn" onclick="answer(3)"></button>
            </div>
        </div>
        <div class="footer">
            <div id="hint" style="color:#8b949e"></div>
            <button id="next-btn" onclick="next()">ДАЛЕЕ ➔</button>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align:center">
        <h1>Результаты теста</h1>
        <div id="final-rank" style="font-size:40px; margin:20px 0">0/26</div>
        <h2 id="status-text"></h2>
        <button class="btn" style="width:200px; text-align:center" onclick="location.reload()">ЗАНОВО</button>
    </div>
</div>

<script>
    const questions = [
        {q: "Специалист, изучающий химические процессы в вине при его созревании и ферментации:", a: ["Сомелье", "Онолог", "Бродильщик", "Ампелограф"], c: 1},
        {q: "Кто занимается созданием новых полимеров с заданными свойствами (например, самозатягивающийся пластик)?", a: ["Материаловед", "Химик-полимерщик", "Архитектор наноструктур", "Вулканизатор"], c: 1},
        {q: "Специалист, изучающий химический состав звезд и межзвездного газа:", a: ["Астрофизик", "Космохимик", "Радиоастроном", "Планетолог"], c: 1},
        {q: "Этот химик определяет возраст археологических находок по изотопу углерода-14:", a: ["Археолог", "Геохимик-радиометрист", "Палеонтолог", "Почвовед"], c: 1},
        {q: "Профессия на стыке химии и юриспруденции: защита прав на новые химические формулы:", a: ["Юрист-консульт", "Патентный поверенный", "Химик-аналитик", "Нотариус"], c: 1},
        {q: "Специалист по химии красок, способный отличить оригинал картины от подделки по составу пигментов:", a: ["Искусствовед", "Химик-реставратор", "Галерист", "Декоратор"], c: 1},
        {q: "Кто разрабатывает химические составы для фейерверков, чтобы добиться определенного цвета пламени?", a: ["Химик-пиротехник", "Взрывотехник", "Инженер по ТБ", "Огнеупорщик"], c: 0},
        {q: "Специалист, рассчитывающий дозировку и побочные эффекты лекарств на основе метаболизма человека:", a: ["Фармацевт", "Клинический фармаколог", "Терапевт", "Токсиколог"], c: 1},
        {q: "Ученый, создающий компьютерные модели химических реакций без единой пробирки:", a: ["Программист", "Квантовый химик", "Системный аналитик", "Биоинформатик"], c: 1},
        {q: "Специалист, очищающий сточные воды заводов с помощью коагулянтов и флокулянтов:", a: ["Эколог", "Инженер по водоподготовке", "Сантехник", "Гидролог"], c: 1},
        {q: "Кто занимается выделением и изучением редких изотопов для ядерной медицины?", a: ["Ядерщик", "Радиохимик", "Рентгенолог", "Физик-теоретик"], c: 1},
        {q: "Специалист по запахам, создающий сложные парфюмерные композиции (верхние, средние и базовые ноты):", a: ["Дегустатор", "Парфюмер-химик", "Флорист", "Стилист"], c: 1},
        {q: "Специалист по анализу нефти и контролю процессов ректификации на НПЗ:", a: ["Бурильщик", "Химик-нефтяник", "Геолог", "Маркшейдер"], c: 1},
        {q: "Кто создает наноматериалы, например, углеродные трубки толщиной в один атом?", a: ["Микробиолог", "Нанотехнолог", "Генетик", "Электронщик"], c: 1},
        {q: "Специалист, определяющий наличие ядов и наркотиков в организме при экспертизе:", a: ["Криминалист", "Токсиколог", "Лаборант", "Нарколог"], c: 1},
        {q: "Кто разрабатывает добавки для бетона, чтобы он не замерзал при -30 градусах?", a: ["Строитель", "Инженер-химик строительных материалов", "Архитектор", "Прораб"], c: 1},
        {q: "Ученый, изучающий химические сигналы, которыми обмениваются насекомые (феромоны):", a: ["Энтомолог", "Хемоэколог", "Зоолог", "Агроном"], c: 1},
        {q: "Специалист, создающий ароматизаторы, идентичные натуральным, для продуктов питания:", a: ["Повар", "Флейворист", "Диетолог", "Технолог"], c: 1},
        {q: "Кто занимается защитой металлов от коррозии с помощью гальванических покрытий?", a: ["Сварщик", "Инженер-гальваник", "Металлург", "Слесарь"], c: 1},
        {q: "Специалист по химии почв и удобрений для повышения урожайности:", a: ["Фермер", "Агрохимик", "Биолог", "Мелиоратор"], c: 1},
        {q: "Кто исследует структуру белков и ДНК методами рентгеноструктурного анализа?", a: ["Генетик", "Биохимик-кристаллограф", "Медик", "Вирусолог"], c: 1},
        {q: "Химик, разрабатывающий ткани, которые не мнутся, не горят или не промокают:", a: ["Дизайнер", "Химик-технолог текстильного производства", "Швея", "Ткач"], c: 1},
        {q: "Специалист по переработке мусора в энергию или сырье без вреда для экологии:", a: ["Мусорщик", "Инженер по рециклингу", "Урбанист", "Активист"], c: 1},
        {q: "Кто проверяет драгоценные камни на подлинность, изучая их химические дефекты?", a: ["Ювелир", "Геммолог", "Оценщик", "Геолог"], c: 1},
        {q: "Специалист по созданию ракетного топлива и изучению его горения в вакууме:", a: ["Пилот", "Химик-энергомашиностроитель", "Космонавт", "Конструктор"], c: 1},
        {q: "Специалист, изучающий биохимию мозга и действие нейромедиаторов:", a: ["Психолог", "Нейрохимик", "Невролог", "Психиатр"], c: 1}
    ];

    let current = 0, score = 0, canAns = true;

    function start() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        load();
    }

    function load() {
        canAns = true;
        document.getElementById('next-btn').style.visibility = 'hidden';
        document.getElementById('q-num').innerText = current + 1;
        document.getElementById('progress').style.width = (current / 26 * 100) + '%';
        document.getElementById('question-text').innerText = questions[current].q;
        const btns = document.querySelectorAll('.option-btn');
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        questions[current].a.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = t;
            b.onclick = () => answer(i, b);
            opts.appendChild(b);
        });
    }

    function answer(idx, btn) {
        if(!canAns) return;
        canAns = false;
        const correct = questions[current].c;
        const btns = document.getElementById('options').children;
        if(idx === correct) {
            btn.classList.add('correct');
            score++;
            document.getElementById('score-val').innerText = score;
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
        }
        document.getElementById('next-btn').style.visibility = 'visible';
    }

    function next() {
        current++;
        if(current < 26) load();
        else finish();
    }

    function finish() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-rank').innerText = score + " / 26";
        let text = "";
        if(score <= 10) text = "Статус: Лаборант. Нужно больше практики!";
        else if(score <= 18) text = "Статус: Химик-технолог. Достойный результат!";
        else if(score <= 24) text = "Статус: Магистр наук. Вы профи!";
        else text = "Статус: Нобелевский лауреат. Гениально!";
        document.getElementById('status-text').innerText = text;
    }
</script>
</body>
</html>
